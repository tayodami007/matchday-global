<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00FF88;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4488FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00FF88;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4488FF;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Shield shape with M and lightning bolt -->
  <g id="shield-mark">
    <!-- Shield outline -->
    <path d="M 200 40 L 320 120 L 320 240 Q 320 320 200 380 Q 80 320 80 240 L 80 120 Z"
          fill="url(#shieldGradient)"
          stroke="none"/>

    <!-- Lightning bolt integrated into M right leg -->
    <g id="lightning-bolt">
      <path d="M 260 130 L 240 180 L 260 180 L 220 260 L 240 260 L 180 380 L 200 280 L 180 280 L 220 160 L 200 160 Z"
            fill="#0A0A0F"
            opacity="0.9"/>
    </g>

    <!-- Stylized M -->
    <g id="letter-m">
      <!-- Left leg of M -->
      <rect x="110" y="140" width="28" height="160" fill="#0A0A0F" rx="4"/>

      <!-- Center peak of M -->
      <polygon points="155,140 155,200 175,140 195,200 195,140"
               fill="#0A0A0F"/>

      <!-- Right leg of M (with lightning integration) -->
      <rect x="200" y="180" width="28" height="120" fill="#0A0A0F" rx="4"/>

      <!-- Top connecting bar -->
      <rect x="110" y="138" width="120" height="12" fill="#0A0A0F" rx="2"/>
    </g>
  </g>

  <!-- Text: MATCHDAY -->
  <text x="200" y="420"
        font-family="Inter, Arial, sans-serif"
        font-size="48"
        font-weight="700"
        text-anchor="middle"
        fill="#E8E8EF"
        letter-spacing="2">MATCHDAY</text>

  <!-- Text: GLOBAL -->
  <text x="200" y="465"
        font-family="Inter, Arial, sans-serif"
        font-size="28"
        font-weight="300"
        text-anchor="middle"
        fill="#E8E8EF"
        letter-spacing="1">GLOBAL</text>
</svg>